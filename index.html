<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Armonía de Frecuencias">
    <link rel="manifest" href="manifest.json">
    <title>Armonía de Frecuencias · Sueño y Sanación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f30 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: #eef3ff;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 20px 16px 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #eef3ff 0%, #98a9d9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 0.85rem;
            color: #98a9d9;
            font-weight: 300;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .header .subtitle span {
            color: #6f8eff;
            font-weight: 400;
        }

        /* Video Section */
        .video-section {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.4);
            aspect-ratio: 16/9;
            min-height: 180px;
        }

        .video-section iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
            z-index: 2;
        }

        .video-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .video-overlay .play-icon {
            width: 70px;
            height: 70px;
            background: rgba(111, 142, 255, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 0 40px rgba(111, 142, 255, 0.3);
            transition: transform 0.2s;
        }

        .video-overlay:active .play-icon {
            transform: scale(0.9);
        }

        .video-controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
            justify-content: center;
        }

        .video-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #b0c3e6;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
            flex: 1;
            min-width: 55px;
            text-align: center;
        }

        .video-btn:active {
            transform: scale(0.92);
        }

        .video-btn.active {
            background: rgba(111, 142, 255, 0.25);
            border-color: #6f8eff;
            color: white;
            box-shadow: 0 0 20px rgba(111, 142, 255, 0.15);
        }

        /* Timer Section */
        .timer-section {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 24px;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .timer-section label {
            color: #b0c3e6;
            font-weight: 300;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-input-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 120px;
        }

        .timer-input-group input {
            flex: 1;
            min-width: 50px;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.35);
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none;
            width: 60px;
        }

        .timer-input-group input:focus {
            border-color: #4f7aff;
            box-shadow: 0 0 0 3px rgba(70, 130, 255, 0.15);
        }

        .timer-input-group select {
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.35);
            color: white;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .timer-input-group select option {
            background: #1a1f30;
            color: white;
        }

        .timer-display {
            font-size: 1.3rem;
            font-weight: 600;
            color: #6f8eff;
            min-width: 70px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        .timer-controls {
            display: flex;
            gap: 6px;
        }

        .timer-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #b6c8f0;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
        }

        .timer-btn:active {
            transform: scale(0.92);
        }

        .timer-btn.active-timer {
            background: #2d4b9e;
            border-color: #6f8eff;
            color: white;
        }

        .timer-btn.stop-timer {
            background: rgba(200, 60, 60, 0.2);
            border-color: rgba(255, 100, 100, 0.2);
            color: #ffa8b0;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 6px 14px 6px 18px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
            gap: 6px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #b0c3e6;
        }

        .status-item .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.active {
            background: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.4);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .dot.inactive {
            background: #6b7da0;
        }

        .dot.timer-active {
            background: #fbbf24;
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.4);
            animation: pulse-dot 1s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Frequency List */
        .freq-list {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 24px;
            padding: 10px 8px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            max-height: 320px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .freq-list::-webkit-scrollbar {
            width: 3px;
        }

        .freq-list::-webkit-scrollbar-thumb {
            background: #3d5588;
            border-radius: 10px;
        }

        .freq-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s;
            border-radius: 10px;
            gap: 6px;
        }

        .freq-item:last-child {
            border-bottom: none;
        }

        .freq-item:active {
            background: rgba(255, 255, 255, 0.03);
        }

        .freq-info {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }

        .freq-name {
            font-weight: 500;
            font-size: 1rem;
            color: #dfe9ff;
        }

        .freq-hz {
            background: rgba(123, 146, 255, 0.12);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b3c9ff;
            border: 1px solid rgba(255, 255, 255, 0.04);
            letter-spacing: 0.3px;
        }

        .freq-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-toggle {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #b6c8f0;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .btn-toggle:active {
            transform: scale(0.88);
        }

        .btn-toggle.active {
            background: #2d4b9e;
            border-color: #6f8eff;
            color: white;
            box-shadow: 0 0 25px rgba(80, 140, 255, 0.2);
        }

        .btn-remove {
            background: transparent;
            border: none;
            color: #6b7da0;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
            transition: all 0.15s;
            line-height: 1;
            touch-action: manipulation;
        }

        .btn-remove:active {
            color: #ff6b7a;
            transform: scale(0.8);
        }

        .empty-state {
            text-align: center;
            color: #5e729b;
            padding: 24px 10px;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .empty-state .icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        /* Add Section */
        .add-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 14px 12px 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .add-title {
            color: #b7c9f5;
            font-weight: 400;
            font-size: 0.8rem;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .freq-selector {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .freq-selector label {
            color: #b0c3e6;
            font-weight: 300;
            font-size: 0.85rem;
            min-width: 32px;
        }

        .freq-selector input {
            flex: 1;
            min-width: 70px;
            padding: 10px 14px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.35);
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        .freq-selector input:focus {
            border-color: #4f7aff;
            background: rgba(20, 30, 60, 0.6);
            box-shadow: 0 0 0 3px rgba(70, 130, 255, 0.15);
        }

        .freq-selector input::placeholder {
            color: #54678a;
        }

        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 2px 0 4px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #b2c6ee;
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
            letter-spacing: 0.3px;
        }

        .preset-btn:active {
            transform: scale(0.92);
            background: #2f4a8a;
            border-color: #6f8eff;
            color: white;
        }

        .add-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .btn-primary {
            background: #2b4b9e;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 70px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            touch-action: manipulation;
        }

        .btn-primary:active {
            transform: scale(0.96);
            background: #1f3d85;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 14px;
            border-radius: 50px;
            color: #b6c8f0;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
            font-size: 0.85rem;
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(0.96);
        }

        /* Master Controls */
        .master-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .master-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 18px;
            border-radius: 50px;
            color: #c0d0f5;
            font-size: 0.8rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        .master-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.06);
        }

        .master-btn.play {
            background: rgba(45, 75, 158, 0.3);
            border-color: rgba(111, 142, 255, 0.2);
        }

        .master-btn.stop {
            background: rgba(200, 60, 60, 0.12);
            border-color: rgba(255, 100, 100, 0.15);
            color: #ffa8b0;
        }

        .master-btn.clear {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 0.65rem;
            color: #4a5e85;
            margin-top: 12px;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 10px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .app-container {
                padding: 12px 10px 16px;
                border-radius: 28px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .freq-item {
                padding: 8px 4px;
                flex-wrap: wrap;
            }

            .freq-controls {
                margin-left: auto;
            }

            .add-actions {
                flex-direction: column;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
                text-align: center;
            }

            .presets {
                justify-content: center;
            }

            .status-bar {
                padding: 4px 10px;
                font-size: 0.65rem;
            }

            .timer-section {
                padding: 10px 12px;
                flex-direction: column;
                align-items: stretch;
            }

            .timer-display {
                font-size: 1.1rem;
                min-width: 50px;
            }

            .video-section {
                min-height: 140px;
            }

            .video-btn {
                font-size: 0.6rem;
                padding: 4px 10px;
                min-width: 45px;
            }
        }

        @media (max-width: 380px) {
            .freq-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }

            .freq-name {
                font-size: 0.9rem;
            }
        }

        @supports (padding: max(0px)) {
            .app-container {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<div class="app-container" role="main">
    <!-- Header -->
    <div class="header">
        <h1>🎵 Armonía</h1>
        <div class="subtitle">Frecuencias para <span>sueño</span> y <span>sanación</span></div>
    </div>

    <!-- Video Section -->
    <div class="video-section" id="videoSection">
        <iframe id="videoIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="video-overlay" id="videoOverlay">
            <div class="play-icon">▶</div>
        </div>
    </div>
    <div class="video-controls">
        <button class="video-btn active" data-video="H6rJGP6N6fA">🌿 Bosque</button>
        <button class="video-btn" data-video="Zv7PjHJ2bW8">🌊 Río</button>
        <button class="video-btn" data-video="vTAMQBW0cQI">🐦 Aves</button>
        <button class="video-btn" data-video="Pp1NEBGXhWs">🌅 Mar</button>
        <button class="video-btn" data-video="R6jN7F0lYIg">🌴 Selva</button>
    </div>

    <!-- Timer Section -->
    <div class="timer-section">
        <label>⏱️ <span>Temporizador</span></label>
        <div class="timer-input-group">
            <input type="number" id="timerMinutes" value="30" min="1" max="180">
            <select id="timerUnit">
                <option value="minutes">minutos</option>
                <option value="hours">horas</option>
            </select>
        </div>
        <div class="timer-display" id="timerDisplay">30:00</div>
        <div class="timer-controls">
            <button class="timer-btn" id="timerStartBtn">▶️ Iniciar</button>
            <button class="timer-btn stop-timer" id="timerStopBtn">⏹️ Detener</button>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">0 activas</span>
        </div>
        <div class="status-item">
            <span>📋</span>
            <span id="totalText">0 frecuencias</span>
        </div>
        <div class="status-item" id="timerStatus" style="display:none;">
            <span class="dot timer-active"></span>
            <span id="timerStatusText">⏱️ Activo</span>
        </div>
    </div>

    <!-- Frequency List -->
    <div class="freq-list" id="freqListContainer">
        <div id="freqList">
            <div class="empty-state">
                <span class="icon">✨</span>
                Agrega frecuencias para comenzar
            </div>
        </div>
    </div>

    <!-- Add Section -->
    <div class="add-section">
        <div class="add-title">➕ Añadir frecuencia</div>
        <div class="freq-selector">
            <label for="freqInput">Hz</label>
            <input type="number" id="freqInput" placeholder="174, 396, 528..." step="0.1" min="0.1" value="432">
        </div>
        <div class="presets">
            <button class="preset-btn" data-hz="174">174</button>
            <button class="preset-btn" data-hz="285">285</button>
            <button class="preset-btn" data-hz="396">396</button>
            <button class="preset-btn" data-hz="417">417</button>
            <button class="preset-btn" data-hz="528">528</button>
            <button class="preset-btn" data-hz="639">639</button>
            <button class="preset-btn" data-hz="741">741</button>
            <button class="preset-btn" data-hz="852">852</button>
            <button class="preset-btn" data-hz="963">963</button>
        </div>
        <div class="add-actions">
            <button class="btn-secondary" id="clearAllBtn">🗑️ Limpiar</button>
            <button class="btn-primary" id="addFreqBtn">➕ Agregar</button>
        </div>
    </div>

    <!-- Master Controls -->
    <div class="master-controls">
        <button class="master-btn play" id="playAllBtn">▶️ Reproducir todo</button>
        <button class="master-btn stop" id="stopAllBtn">⏹️ Detener todo</button>
    </div>

    <div class="footer">
        ⚡ Usa auriculares · Frecuencias binaurales · Videos libres de naturaleza
    </div>
</div>

<script>
    (function() {
        'use strict';

        // === STATE ===
        let frequencies = [];
        let audioContext = null;
        let nextId = 1;
        let timerInterval = null;
        let timerRemaining = 0;
        let timerTotal = 0;
        let timerActive = false;
        let timerUnit = 'minutes';
        let currentVideoId = 'H6rJGP6N6fA';

        // === DOM REFS ===
        const freqListEl = document.getElementById('freqList');
        const freqInput = document.getElementById('freqInput');
        const addBtn = document.getElementById('addFreqBtn');
        const clearBtn = document.getElementById('clearAllBtn');
        const playAllBtn = document.getElementById('playAllBtn');
        const stopAllBtn = document.getElementById('stopAllBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const totalText = document.getElementById('totalText');
        const timerStatus = document.getElementById('timerStatus');
        const timerStatusText = document.getElementById('timerStatusText');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerMinutes = document.getElementById('timerMinutes');
        const timerUnitSelect = document.getElementById('timerUnit');
        const timerStartBtn = document.getElementById('timerStartBtn');
        const timerStopBtn = document.getElementById('timerStopBtn');

        // Video
        const videoIframe = document.getElementById('videoIframe');
        const videoOverlay = document.getElementById('videoOverlay');
        const videoBtns = document.querySelectorAll('.video-btn');

        // === VIDEO CONTROL ===
        function loadVideo(videoId, autoplay = true) {
            currentVideoId = videoId;
            const autoplayParam = autoplay ? '1' : '0';
            const url = `https://www.youtube.com/embed/${videoId}?autoplay=${autoplayParam}&mute=1&loop=1&playlist=${videoId}&controls=0&rel=0&modestbranding=1`;
            videoIframe.src = url;
            
            // Ocultar overlay si está reproduciendo
            if (autoplay) {
                videoOverlay.classList.add('hidden');
            } else {
                videoOverlay.classList.remove('hidden');
            }

            // Update active button
            videoBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.video === videoId);
            });
        }

        // Cargar video inicial
        loadVideo('H6rJGP6N6fA', true);

        // Event listeners para botones de video
        videoBtns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const videoId = this.dataset.video;
                if (videoId === currentVideoId) {
                    // Si es el mismo video, reiniciar
                    loadVideo(videoId, true);
                } else {
                    loadVideo(videoId, true);
                }
            });
        });

        // Click en overlay para reproducir
        videoOverlay.addEventListener('click', function() {
            this.classList.add('hidden');
            // Recargar el video con autoplay
            loadVideo(currentVideoId, true);
        });

        // Cuando el iframe carga, ocultar overlay si está en autoplay
        videoIframe.addEventListener('load', function() {
            // El overlay se oculta automáticamente con loadVideo
        });

        // === AUDIO HELPERS ===
        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume().catch(e => console.warn('Audio resume error:', e));
            }
            return audioContext;
        }

        function createOscillator(hz) {
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = hz;
            gain.gain.value = 0.08;
            osc.connect(gain);
            gain.connect(ctx.destination);
            return { oscillator: osc, gainNode: gain };
        }

        function startOscillator(oscillator) {
            try {
                oscillator.start(audioContext.currentTime);
            } catch (e) {
                // ya iniciado
            }
        }

        function stopOscillator(oscillator, gainNode) {
            try {
                if (gainNode) {
                    gainNode.gain.setTargetAtTime(0, audioContext.currentTime, 0.05);
                    setTimeout(() => {
                        try { oscillator.stop(); } catch (e) {}
                    }, 150);
                } else {
                    oscillator.stop();
                }
            } catch (e) {}
        }

        // === TIMER ===
        function updateTimerDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function getTotalSeconds() {
            const value = parseInt(timerMinutes.value) || 0;
            const unit = timerUnitSelect.value;
            return unit === 'hours' ? value * 3600 : value * 60;
        }

        function startTimer() {
            if (timerActive) return;

            const total = getTotalSeconds();
            if (total <= 0) {
                alert('Ingresa un tiempo válido (mínimo 1 minuto)');
                return;
            }

            timerTotal = total;
            timerRemaining = total;
            timerActive = true;
            timerStatus.style.display = 'flex';
            timerStatusText.textContent = '⏱️ Activo';
            timerStartBtn.textContent = '⏸️ Pausar';
            timerStartBtn.classList.add('active-timer');

            updateTimerDisplay(timerRemaining);

            timerInterval = setInterval(() => {
                timerRemaining--;
                updateTimerDisplay(timerRemaining);

                if (timerRemaining <= 0) {
                    stopTimer();
                    stopAll();
                    alert('⏰ ¡Tiempo completado! Las frecuencias se han detenido.');
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!timerActive) return;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerActive = false;
            timerStartBtn.textContent = '▶️ Reanudar';
            timerStartBtn.classList.remove('active-timer');
            timerStatusText.textContent = '⏸️ Pausado';
        }

        function resumeTimer() {
            if (timerActive || timerRemaining <= 0) return;
            timerActive = true;
            timerStartBtn.textContent = '⏸️ Pausar';
            timerStartBtn.classList.add('active-timer');
            timerStatusText.textContent = '⏱️ Activo';

            timerInterval = setInterval(() => {
                timerRemaining--;
                updateTimerDisplay(timerRemaining);

                if (timerRemaining <= 0) {
                    stopTimer();
                    stopAll();
                    alert('⏰ ¡Tiempo completado! Las frecuencias se han detenido.');
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerActive = false;
            timerStatus.style.display = 'none';
            timerStartBtn.textContent = '▶️ Iniciar';
            timerStartBtn.classList.remove('active-timer');
            timerRemaining = 0;
            updateTimerDisplay(0);
        }

        // Timer event listeners
        timerStartBtn.addEventListener('click', function() {
            if (timerActive) {
                pauseTimer();
            } else if (timerRemaining > 0 && !timerActive) {
                resumeTimer();
            } else {
                startTimer();
            }
        });

        timerStopBtn.addEventListener('click', stopTimer);

        timerUnitSelect.addEventListener('change', function() {
            const total = getTotalSeconds();
            updateTimerDisplay(total);
        });

        timerMinutes.addEventListener('input', function() {
            const total = getTotalSeconds();
            updateTimerDisplay(total);
        });

        // === RENDER ===
        function render() {
            if (frequencies.length === 0) {
                freqListEl.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">✨</span>
                        Agrega frecuencias para comenzar
                    </div>
                `;
                updateStatus();
                return;
            }

            let html = '';
            frequencies.forEach(f => {
                const activeClass = f.active ? 'active' : '';
                const statusText = f.active ? '⏸️' : '▶️';
                html += `
                    <div class="freq-item" data-id="${f.id}">
                        <div class="freq-info">
                            <span class="freq-name">${f.name || f.hz + ' Hz'}</span>
                            <span class="freq-hz">${f.hz} Hz</span>
                        </div>
                        <div class="freq-controls">
                            <button class="btn-toggle ${activeClass}" data-action="toggle" data-id="${f.id}">${statusText}</button>
                            <button class="btn-remove" data-action="remove" data-id="${f.id}">✕</button>
                        </div>
                    </div>
                `;
            });
            freqListEl.innerHTML = html;
            updateStatus();
        }

        function updateStatus() {
            const activeCount = frequencies.filter(f => f.active).length;
            const total = frequencies.length;

            statusText.textContent = `${activeCount} activa${activeCount !== 1 ? 's' : ''}`;
            totalText.textContent = `${total} frecuencia${total !== 1 ? 's' : ''}`;

            if (activeCount > 0) {
                statusDot.className = 'dot active';
            } else {
                statusDot.className = 'dot inactive';
            }
        }

        // === CRUD OPERATIONS ===
        function addFrequency(hz, name = null) {
            if (isNaN(hz) || hz <= 0) {
                alert('Ingresa una frecuencia válida (mayor a 0)');
                return false;
            }

            if (frequencies.length >= 20) {
                alert('Máximo 20 frecuencias permitidas');
                return false;
            }

            const id = nextId++;
            frequencies.push({
                id,
                hz,
                name: name || `${hz} Hz`,
                active: false,
                oscillator: null,
                gainNode: null
            });
            render();
            return true;
        }

        function toggleFrequency(id) {
            const entry = frequencies.find(f => f.id === id);
            if (!entry) return;

            if (entry.active) {
                if (entry.oscillator) {
                    stopOscillator(entry.oscillator, entry.gainNode);
                    entry.oscillator = null;
                    entry.gainNode = null;
                }
                entry.active = false;
            } else {
                try {
                    const ctx = getAudioContext();
                    const { oscillator, gainNode } = createOscillator(entry.hz);
                    entry.oscillator = oscillator;
                    entry.gainNode = gainNode;
                    startOscillator(oscillator);
                    entry.active = true;
                } catch (e) {
                    console.error('Error starting frequency:', e);
                    alert('No se pudo reproducir el sonido. Verifica que tu navegador lo permita.');
                    return;
                }
            }
            render();
        }

        function removeFrequency(id) {
            const entry = frequencies.find(f => f.id === id);
            if (!entry) return;

            if (entry.active && entry.oscillator) {
                stopOscillator(entry.oscillator, entry.gainNode);
            }
            frequencies = frequencies.filter(f => f.id !== id);
            render();
        }

        function clearAll() {
            frequencies.forEach(f => {
                if (f.active && f.oscillator) {
                    stopOscillator(f.oscillator, f.gainNode);
                }
            });
            frequencies = [];
            render();
        }

        function playAll() {
            if (frequencies.length === 0) return;

            const ctx = getAudioContext();

            frequencies.forEach(f => {
                if (f.active) return;
                try {
                    const { oscillator, gainNode } = createOscillator(f.hz);
                    f.oscillator = oscillator;
                    f.gainNode = gainNode;
                    startOscillator(oscillator);
                    f.active = true;
                } catch (e) {
                    console.warn('Error starting', f.hz, e);
                }
            });
            render();
        }

        function stopAll() {
            frequencies.forEach(f => {
                if (f.active && f.oscillator) {
                    stopOscillator(f.oscillator, f.gainNode);
                    f.oscillator = null;
                    f.gainNode = null;
                    f.active = false;
                }
            });
            render();
        }

        // === PRESET FREQUENCIES ===
        function loadPresets() {
            const presetList = [
                { hz: 174, name: '174 · Base' },
                { hz: 285, name: '285 · Cura' },
                { hz: 396, name: '396 · Libera' },
                { hz: 528, name: '528 · Amor' },
                { hz: 639, name: '639 · Conexión' },
                { hz: 741, name: '741 · Despertar' }
            ];
            presetList.forEach(p => addFrequency(p.hz, p.name));
        }

        // === EVENT LISTENERS ===
        function setupEvents() {
            addBtn.addEventListener('click', function() {
                const val = parseFloat(freqInput.value);
                if (!isNaN(val) && val > 0) {
                    addFrequency(val);
                    freqInput.value = '';
                } else {
                    alert('Ingresa un número válido (ej. 432)');
                }
            });

            freqInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    addBtn.click();
                }
            });

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const hz = parseFloat(this.dataset.hz);
                    if (!isNaN(hz) && hz > 0) {
                        addFrequency(hz);
                    }
                });
            });

            freqListEl.addEventListener('click', function(e) {
                const target = e.target.closest('button');
                if (!target) return;

                const id = parseInt(target.dataset.id, 10);
                if (isNaN(id)) return;

                if (target.dataset.action === 'toggle') {
                    toggleFrequency(id);
                } else if (target.dataset.action === 'remove') {
                    removeFrequency(id);
                }
            });

            clearBtn.addEventListener('click', clearAll);
            playAllBtn.addEventListener('click', playAll);
            stopAllBtn.addEventListener('click', stopAll);
        }

        // === AUDIO CONTEXT RESUME ===
        function setupAudioResume() {
            const resumeAudio = function() {
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume().catch(e => console.warn('Resume failed:', e));
                }
            };

            document.addEventListener('click', resumeAudio, { once: false });
            document.addEventListener('touchstart', resumeAudio, { once: false });
        }

        // === CLEANUP ===
        function setupCleanup() {
            window.addEventListener('beforeunload', function() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                frequencies.forEach(f => {
                    if (f.oscillator) {
                        try { f.oscillator.stop(); } catch (e) {}
                    }
                });
                if (audioContext) {
                    try { audioContext.close(); } catch (e) {}
                }
            });
        }

        // === INIT ===
        loadPresets();
        setupEvents();
        setupAudioResume();
        setupCleanup();

        // Initial timer display
        updateTimerDisplay(getTotalSeconds());

        console.log('🎵 Armonía de Frecuencias iniciada');
        console.log(`📋 ${frequencies.length} frecuencias cargadas`);
        console.log('🎥 Videos de naturaleza disponibles');

    })();
</script>
